workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      # 1. 解压 src.zip
      - name: Unzip source code
        script: |
          unzip -o src.zip -d ./
          ls -la  # 打印目录结构，方便排查

      # 2. 安装依赖
      - name: Install dependencies
        script: |
          npm install

      # 3. 强制生成标准 iOS 项目
      - name: Prebuild iOS project
        script: |
          npx expo prebuild --platform ios --no-install
          cd ios
          pod install --repo-update
          ls -la  # 确认项目文件生成

      # 4. 直接用 Expo 生成的标准 scheme 编译
      - name: Build unsigned IPA
        script: |
          cd ios
          # 直接指定 Expo 默认的 scheme 和 workspace
          xcodebuild build \
            -workspace TiciqiExpo.xcworkspace \
            -scheme TiciqiExpo \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/build/Release-iphoneos/*.ipa
