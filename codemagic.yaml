workflows:
  build-ios:
    name: Build iOS
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild native projects
        script: |
          npx expo prebuild --platform ios
      - name: Build IPA with Expo
        script: |
          npx expo run:ios --configuration Release
    artifacts:
      - build/ios/ipa/*.ipa
