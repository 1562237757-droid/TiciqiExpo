workflows:
  build-ios:
    name: Build iOS
    environment:
      node: latest
    scripts:
      - name: Unzip src folder
        script: |
          unzip -o src.zip -d ./
      - name: Install dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Log in to Expo
        script: |
          echo "$EXPO_TOKEN" | eas login --token
      - name: Build with EAS
        script: |
          eas build --platform ios --profile preview --non-interactive
    artifacts:
      - build/*.ipa
