workflows:
  build-ios:
    name: Build iOS
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild native projects
        script: |
          npx expo prebuild --platform ios
      - name: Build iOS IPA
        script: |
          cd ios && xcodebuild -workspace *.xcworkspace -scheme $(xcodebuild -list -json | jq -r '.workspace.schemes[0]') -configuration Release -sdk iphoneos build
    artifacts:
      - build/ios/ipa/*.ipa
