workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      # 解压你上传的 src.zip
      - name: Unzip source code
        script: |
          unzip -o src.zip -d ./

      # 安装依赖
      - name: Install dependencies
        script: |
          npm install

      # 生成 iOS 项目 + 无签名编译
      - name: Build unsigned iOS app
        script: |
          npx expo prebuild --platform ios
          cd ios
          pod install
          # 用通配符匹配，自动找到 workspace 和 scheme
          WORKSPACE=$(ls *.xcworkspace)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | grep -A 10 "Schemes:" | tail -1 | xargs)
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/build/Release-iphoneos/*.ipa
