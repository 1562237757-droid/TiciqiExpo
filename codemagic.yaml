workflows:
  build-ios:
    name: Build iOS
    environment:
      node: latest
    scripts:
      # 解压你上传的 src.zip
      - name: Unzip src folder
        script: |
          unzip -o src.zip -d ./
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild native projects
        script: |
          npx expo prebuild --platform ios
      # 用 Expo Run 命令构建IPA
      - name: Build IPA
        script: |
          cd ios
          pod install
          xcodebuild archive -workspace *.xcworkspace -scheme TiciqiExpo -configuration Release -archivePath build/TiciqiExpo.xcarchive
          xcodebuild -exportArchive -archivePath build/TiciqiExpo.xcarchive -exportPath build/ios/ipa -exportOptionsPlist ../exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
