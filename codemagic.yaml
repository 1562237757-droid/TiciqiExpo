workflows:
  build-ios:
    name: Build iOS
    environment:
      node: latest
    scripts:
      # 第一步：解压你上传的 src.zip
      - name: Unzip src folder
        script: |
          unzip -o src.zip -d ./
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild native projects
        script: |
          npx expo prebuild --platform ios
      - name: Build IPA
        script: |
          npx expo build:ios --non-interactive --no-pwa
    artifacts:
      - build/ios/ipa/*.ipa
