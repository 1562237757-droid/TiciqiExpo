workflows:
  build-ios:
    name: Build iOS
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Unzip src folder
        script: |
          unzip -o src.zip -d ./

      - name: Install dependencies
        script: |
          npm install

      - name: Build iOS app
        script: |
          npx expo prebuild --platform ios
          cd ios
          pod install
          xcodebuild -workspace *.xcworkspace -scheme * -configuration Release -sdk iphoneos build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/build/*.ipa
